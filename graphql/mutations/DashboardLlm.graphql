mutation DashboardLlmTestConnection {
  dashboard {
    testLlmConnection {
      ok
      error
      connected
      latencySeconds
    }
  }
}

mutation DashboardLlmRunBenchmark($sampleSize: Int!) {
  dashboard {
    runLlmBenchmark(sampleSize: $sampleSize) {
      sampleSize
      successes
      failures
      matched
      unmatched
      errored
      averageLatencySeconds
      throughputPerSecond
      distribution {
        contentType
        count
      }
    }
  }
}
