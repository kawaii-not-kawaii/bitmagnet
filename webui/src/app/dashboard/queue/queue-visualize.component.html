<ng-container *transloco="let t">
  <app-document-title [parts]="[t('routes.visualize'), t('routes.queues')]" />

  <section class="visualize" aria-label="Queue activity">
    <div class="filter-bar">
      <label class="select-control">
        <span>{{ t("dashboard.metrics.timeframe") }}</span>
        <select
          [value]="queueMetricsController.params.buckets.timeframe"
          (change)="
            queueMetricsController.setTimeframe($any($event.target).value)
          "
        >
          @for (name of timeframeNames; track name) {
            <option [value]="name">
              {{ t("dashboard.interval." + name) }}
            </option>
          }
        </select>
      </label>

      <div class="resolution-control">
        <label>
          <span>{{ t("dashboard.metrics.resolution") }}</span>
          <input
            type="number"
            min="1"
            step="1"
            inputmode="numeric"
            [placeholder]="
              (
                queueMetricsController.result$ | async
              )?.params?.buckets?.multiplier?.toString() ?? 'auto'
            "
            [value]="
              queueMetricsController.params.buckets.multiplier === 'AUTO'
                ? ''
                : queueMetricsController.params.buckets.multiplier
            "
            (change)="handleMultiplierEvent($event)"
          />
        </label>
        <label class="resolution-unit">
          <span aria-hidden="true">&nbsp;</span>
          <select
            [value]="queueMetricsController.bucketDuration"
            (change)="
              queueMetricsController.setBucketDuration(
                $any($event.target).value
              )
            "
          >
            @for (name of resolutionNames; track name) {
              <option [value]="name">
                {{ t("dashboard.interval." + name + "s") }}
              </option>
            }
          </select>
        </label>
      </div>

      <label class="select-control">
        <span>{{ t("dashboard.queues.queue") }}</span>
        <select
          [value]="queueMetricsController.params.queue ?? '_all'"
          (change)="
            queueMetricsController.setQueue(
              $any($event.target).value === '_all'
                ? null
                : $any($event.target).value
            )
          "
        >
          <option value="_all">{{ t("general.all") }}</option>
          @for (queue of availableQueueNames; track queue) {
            <option [value]="queue">{{ queue }}</option>
          }
        </select>
      </label>

      <label class="select-control">
        <span>{{ t("dashboard.metrics.event") }}</span>
        <select
          [value]="queueMetricsController.params.event ?? '_all'"
          (change)="
            queueMetricsController.setEvent(
              $any($event.target).value === '_all'
                ? null
                : $any($event.target).value
            )
          "
        >
          <option value="_all">{{ t("general.all") }}</option>
          @for (event of eventNames; track event) {
            <option [value]="event">
              {{ t("dashboard.event." + event) }}
            </option>
          }
        </select>
      </label>

      <label class="select-control">
        <span>{{ t("general.refresh") }}</span>
        <select
          [value]="queueMetricsController.params.autoRefresh"
          (change)="
            queueMetricsController.setAutoRefreshInterval(
              $any($event.target).value
            )
          "
        >
          @for (name of autoRefreshIntervalNames; track name) {
            <option [value]="name">
              {{ t("dashboard.interval." + name) }}
            </option>
          }
        </select>
      </label>

      <button
        type="button"
        class="refresh-button"
        [class.loading]="queueMetricsController.loading"
        (click)="queueMetricsController.refresh()"
        [attr.aria-label]="t('general.refresh')"
        [title]="t('general.refresh')"
      >
        ↻
      </button>
    </div>

    <div
      class="loading-line"
      [class.active]="queueMetricsController.loading"
    ></div>

    <div class="chart-grid">
      <article class="chart-card">
        <header>
          <div>
            <strong>{{ t("dashboard.queues.total_counts_by_status") }}</strong>
            <span>Current queue distribution</span>
          </div>
        </header>
        <div class="chart-wrap">
          <app-chart
            title=""
            [adapter]="totals"
            [$data]="queueMetricsController.result$"
            [height]="330"
            [width]="520"
          />
        </div>
      </article>

      <article class="chart-card">
        <header>
          <div>
            <strong>{{ t("dashboard.metrics.throughput") }}</strong>
            <span>Queue events over time</span>
          </div>
          <span class="live-indicator"><i></i> live metrics</span>
        </header>
        <div class="chart-wrap">
          <app-chart
            title=""
            [adapter]="timeline"
            [legend]="breakpoints.sizeAtLeast('Small')"
            [$data]="queueMetricsController.result$"
            [height]="330"
            [width]="520"
          />
        </div>
      </article>
    </div>
  </section>
</ng-container>
