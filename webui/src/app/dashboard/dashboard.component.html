<main class="dashboard-shell">
  <header class="page-heading">
    <h1>Dashboard</h1>
    <div class="status-line" [class.down]="health.result.status === 'error'">
      <span class="status-dot" aria-hidden="true"></span>
      bitmagnet is
      {{ health.result.status === "error" ? "unavailable" : "operational" }}
    </div>
  </header>

  <nav class="dashboard-tabs" aria-label="Dashboard views">
    <a
      routerLink="/dashboard"
      routerLinkActive="active"
      [routerLinkActiveOptions]="{ exact: true }"
      >Overview</a
    >
    <a routerLink="/dashboard/metrics" routerLinkActive="active"
      >Torrent metrics</a
    >
    <a routerLink="/dashboard/llm" routerLinkActive="active">LLM engine</a>
  </nav>

  <router-outlet />
</main>
